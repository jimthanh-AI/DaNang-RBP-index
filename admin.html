<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - VCCI RBP Index</title>
    <!-- CSS Standard -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .admin-sidebar { background: #111827; color: white; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .admin-grid-top { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .metric-card { background: white; padding: 24px; border-radius: 16px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .metric-value { font-size: 2rem; font-weight: 800; }
        .admin-chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px; }
        .table-card { background: white; padding: 24px; border-radius: 16px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { background: #F9FAFB; font-weight: 700; }
        .badge-tier { padding: 4px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .tier-Platinum { background: #F3F4F6; color: #374151; border: 1px solid #D1D5DB; }
        .tier-Gold { background: #FEF3C7; color: #D97706; border: 1px solid #FDE68A; }
        .tier-Silver { background: #E5E7EB; color: #4B5563; border: 1px solid #D1D5DB; }
        .tier-Compliant { background: #D1FAE5; color: #059669; border: 1px solid #A7F3D0; }
    </style>
</head>
<body>

    <aside class="sidebar" style="background: #111827; color: white;">
        <div class="logo">
            <i class="fa-solid fa-shield-halved"></i>
            <span>VCCI RBP Admin</span>
        </div>
        <ul class="nav-links">
            <li class="nav-item active"><i class="fa-solid fa-chart-line"></i> <span>Tổng quan</span></li>
            <li class="nav-item"><i class="fa-solid fa-list-check"></i> <span>Doanh nghiệp</span></li>
        </ul>
        <div style="margin-top: auto; padding-top: 20px; text-align: center; border-top: 1px solid #1F2937;">
            <a href="index.html" style="text-decoration: none; color: #9CA3AF; font-weight: 600; font-size: 0.85rem;"><i class="fa-solid fa-circle-arrow-left"></i> Quay về Trang chủ</a>
        </div>
    </aside>

    <div class="main-wrapper">
        <nav class="navbar">
            <h2 style="font-weight: 600;"><i class="fa-solid fa-gauge"></i> VCCI Control Panel</h2>
            <button onclick="alert('Tính năng xuất CSV đang hỗ trợ.');" style="background: white; border: 1px solid #E5E7EB; color: #1F2937;"><i class="fa-solid fa-file-excel"></i> Xuất CSV</button>
        </nav>

        <main class="content-panel">
            
            <div class="admin-grid-top">
                <div class="metric-card">
                    <div><div style="font-size: 0.8rem; color: #6B7280; font-weight: 600;">DOANH NGHIỆP</div><div class="metric-value">25</div></div>
                    <i class="fa-solid fa-building" style="font-size: 2.5rem; color: #D1FAE5;"></i>
                </div>
                <div class="metric-card">
                    <div><div style="font-size: 0.8rem; color: #6B7280; font-weight: 600;">ĐIỂM TRUNG BÌNH</div><div class="metric-value">68.2</div></div>
                    <i class="fa-solid fa-chart-simple" style="font-size: 2.5rem; color: #DBEAFE;"></i>
                </div>
                <div class="metric-card">
                    <div><div style="font-size: 0.8rem; color: #6B7280; font-weight: 600;">MINH CHỨNG UPLOAD</div><div class="metric-value">142</div></div>
                    <i class="fa-solid fa-paperclip" style="font-size: 2.5rem; color: #FEE2E2;"></i>
                </div>
            </div>

            <div class="admin-chart-row">
                <div class="chart-card">
                    <div class="card-header-sub">TỶ LỆ XẾP HẠNG DOANH NGHIỆP</div>
                    <div style="height: 250px;"><canvas id="pieChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="card-header-sub">ĐIỂM TRUNG BÌNH THEO 4 TRỤ CỘT</div>
                    <div style="height: 250px;"><canvas id="barChart"></canvas></div>
                </div>
            </div>

            <div class="breakdown-headline">Danh sách Đánh giá Gần đây</div>
            <div class="table-card">
                <table>
                    <thead>
                        <tr><th>Doanh nghiệp</th><th>Mã số thuế</th><th>Trụ cột thấp nhất</th><th>Xếp hạng</th><th>Tổng điểm</th><th>Thao tác</th></tr>
                    </thead>
                    <tbody id="sme-table-body"></tbody>
                </table>
            </div>

        </main>
    </div>

    <!-- Scripts setup -->
    <script src="js/admin.js"></script>
</body>
</html>
