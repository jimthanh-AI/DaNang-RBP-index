<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - VCCI RBP Index</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #10B981;
            --primary-hover: #059669;
            --bg-page: #F3F8F5;
            --bg-card: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

        body { background-color: var(--bg-page); display: flex; height: 100vh; overflow: hidden; }

        .sidebar {
            width: var(--sidebar-width); background: #111827; color: white;
            display: flex; flex-direction: column; padding: 24px; height: 100%;
        }

        .logo {
            display: flex; align-items: center; gap: 12px; font-size: 1.2rem;
            font-weight: 700; color: #10B981; padding-bottom: 24px; border-bottom: 1px solid #1F2937;
        }

        .nav-links { list-style: none; margin-top: 24px; }

        .nav-item {
            padding: 12px 16px; border-radius: 10px; margin-bottom: 8px;
            cursor: pointer; display: flex; align-items: center; gap: 12px; color: #9CA3AF;
        }

        .nav-item:hover, .nav-item.active { background: #1F2937; color: #10B981; }

        .main-wrapper { flex-grow: 1; display: flex; flex-direction: column; height: 100%; }

        .navbar {
            height: 70px; background: white; padding: 0 30px;
            display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border);
        }

        .navbar button { background: white; border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; cursor: pointer; }

        .content-panel { flex-grow: 1; padding: 30px; overflow-y: auto; }

        .admin-grid-top { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }

        .metric-card {
            background: white; padding: 24px; border-radius: 16px; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }

        .metric-value { font-size: 2rem; font-weight: 800; }

        .admin-chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }

        .chart-card { background: white; padding: 24px; border-radius: 16px; border: 1px solid var(--border); }

        .breakdown-headline { font-size: 1.25rem; font-weight: 700; margin-bottom: 15px; }

        .table-card { background: white; padding: 20px; border-radius: 16px; border: 1px solid var(--border); overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        th { background: #F9FAFB; font-weight: 700; }

        .badge-tier { padding: 4px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; }
        .tier-Platinum { background: #F3F4F6; color: #374151; }
        .tier-Gold { background: #FEF3C7; color: #D97706; }
        .tier-Silver { background: #E5E7EB; color: #4B5563; }
        .tier-Compliant { background: #D1FAE5; color: #059669; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><i class="fa-solid fa-shield-halved"></i><span>VCCI RBP Admin</span></div>
        <ul class="nav-links">
            <li class="nav-item active"><i class="fa-solid fa-chart-line"></i><span>Tổng quan</span></li>
            <li class="nav-item"><i class="fa-solid fa-list-check"></i><span>Doanh nghiệp</span></li>
            <li class="nav-item" onclick="sessionStorage.clear(); window.location.href='home.html';"><i class="fa-solid fa-right-from-bracket"></i><span>Đăng xuất</span></li>
        </ul>
    </div>

    <div class="main-wrapper">
        <nav class="navbar">
            <h2 style="font-weight: 600;"><i class="fa-solid fa-gauge"></i> VCCI Control Panel</h2>
            <button onclick="alert('Tính năng xuất Excel đang được xử lý.');"><i class="fa-solid fa-file-excel"></i> Xuất CSV</button>
        </nav>

        <main class="content-panel">
            <div class="admin-grid-top">
                <div class="metric-card">
                    <div><div style="font-size: 0.75rem; color: #6F7785;">DOANH NGHIỆP</div><div class="metric-value">24</div></div>
                    <i class="fa-solid fa-building" style="font-size: 2.5rem; color: #D1FAE5;"></i>
                </div>
                <div class="metric-card">
                    <div><div style="font-size: 0.75rem; color: #6F7785;">ĐIỂM TRUNG BÌNH</div><div class="metric-value">67.8</div></div>
                    <i class="fa-solid fa-chart-simple" style="font-size: 2.5rem; color: #DBEAFE;"></i>
                </div>
                <div class="metric-card">
                    <div><div style="font-size: 0.75rem; color: #6F7785;">MINH CHỨNG UPLOAD</div><div class="metric-value">142</div></div>
                    <i class="fa-solid fa-paperclip" style="font-size: 2.5rem; color: #FEE2E2;"></i>
                </div>
            </div>

            <div class="admin-chart-row">
                <div class="chart-card">
                    <div style="font-size: 0.8rem; font-weight: 600; margin-bottom: 15px; color: var(--primary);">TỶ LỆ XẾP HẠNG DOANH NGHIỆP</div>
                    <div style="height: 250px;"><canvas id="pieChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <div style="font-size: 0.8rem; font-weight: 600; margin-bottom: 15px; color: var(--primary);">ĐIỂM TRUNG BÌNH THEO 4 TRỤ CỘT</div>
                    <div style="height: 250px;"><canvas id="barChart"></canvas></div>
                </div>
            </div>

            <div class="breakdown-headline">Danh sách Đánh giá Gần đây</div>
            <div class="table-card">
                <table>
                    <thead>
                        <tr><th>Doanh nghiệp</th><th>Mã số thuế</th><th>Trụ cột thấp nhất</th><th>Xếp hạng</th><th>Tổng điểm</th><th>Thao tác</th></tr>
                    </thead>
                    <tbody id="sme-table-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const mockSMEs = [
                { name: "SME GreenTech JSC", tax: "0400123456", lowest: "Môi trường", rank: "Gold", score: 75 },
                { name: "Công ty May mặc Đà Nẵng", tax: "0400654321", lowest: "Cộng đồng", rank: "Silver", score: 62 },
                { name: "Khách sạn Biển Xanh", tax: "0400987654", lowest: "Quản trị", rank: "Compliant", score: 48 },
                { name: "Hải sản Sông Hàn", tax: "0400111222", lowest: "Xã hội", rank: "Platinum", score: 88 },
                { name: "Nhà hàng Phố Việt", tax: "0400999000", lowest: "Xã hội", rank: "Compliant", score: 52 }
            ];

            const tableBody = document.getElementById('sme-table-body');
            tableBody.innerHTML = mockSMEs.map(sme => `
                <tr>
                    <td style="font-weight: 600;">${sme.name}</td>
                    <td>${sme.tax}</td>
                    <td><span style="color: #EF4444; font-weight: 600;">${sme.lowest}</span></td>
                    <td><span class="badge-tier tier-${sme.rank}">${sme.rank}</span></td>
                    <td style="font-weight: 800; color: #059669;">${sme.score}</td>
                    <td><button onclick="alert('Xem chi tiết báo cáo ${sme.name}');">Chi tiết</button></td>
                </tr>
            `).join('');

            const pieCtx = document.getElementById('pieChart').getContext('2d');
            new Chart(pieCtx, {
                type: 'doughnut', data: {
                    labels: ['Platinum', 'Gold', 'Silver', 'Compliant'],
                    datasets: [{ data: [15, 35, 30, 20], backgroundColor: ['#047857', '#FBBF24', '#9CA3AF', '#34D399'] }]
                }, options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
            });

            const barCtx = document.getElementById('barChart').getContext('2d');
            new Chart(barCtx, {
                type: 'bar', data: {
                    labels: ['Quản trị', 'Xã hội', 'Môi trường', 'Cộng đồng'],
                    datasets: [{ label: 'Điểm trung bình', data: [72.3, 68.5, 61.2, 69.4], backgroundColor: 'rgba(16, 185, 129, 0.8)' }]
                }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } }
            });
        });
    </script>

</body>
</html>
