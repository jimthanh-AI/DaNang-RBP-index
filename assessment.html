<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBP Da Nang - Khảo sát Tự Đánh giá</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Startup Profile Modal -->
    <div id="startup-modal" class="modal-overlay">
        <div class="modal-content">
            <i class="fa-solid fa-address-card" style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;"></i>
            <h3>Thông tin Doanh nghiệp</h3>
            <p style="font-size: 0.9rem; color: #6B7280; margin-bottom: 20px;">Vui lòng nhập thông tin để chúng tôi khởi tạo báo cáo RBP chuẩn xác nhất cho bạn.</p>
            
            <input type="text" id="company-name" placeholder="Tên Doanh nghiệp (VD: SME GreenTech JSC)" required>
            <input type="text" id="company-tax" placeholder="Mã số thuế (VD: 0400123456)" required>
            
            <button id="start-btn" onclick="saveProfileAndStart()">Bắt đầu Khảo sát <i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </div>

    <!-- Sidebar Left Navigation -->
    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-feather-pointed"></i>
            <span>RBP Da Nang</span>
        </div>
        <ul class="nav-links">
            <li class="nav-item active" data-pillar="G"><i class="fa-solid fa-building-shield"></i> <span>Quản trị (Governance)</span></li>
            <li class="nav-item" data-pillar="S"><i class="fa-solid fa-users"></i> <span>Xã hội (Social)</span></li>
            <li class="nav-item" data-pillar="E"><i class="fa-solid fa-leaf"></i> <span>Môi trường (Environment)</span></li>
            <li class="nav-item" data-pillar="C"><i class="fa-solid fa-handshake-angle"></i> <span>Cộng đồng (Community)</span></li>
        </ul>
        <div style="margin-top: auto; padding-top: 20px; text-align: center; border-top: 1px solid var(--border);">
            <a href="index.html" style="text-decoration: none; color: var(--text-muted); font-weight: 600; font-size: 0.85rem;"><i class="fa-solid fa-circle-arrow-left"></i> Quay về Trang chủ</a>
        </div>
    </aside>

    <!-- Main Wrapper View -->
    <div class="main-wrapper">
        <nav class="navbar">
            <div class="progress-container">
                <div class="progress-text"><span>Tiến trình: <b id="progress-percent">0%</b></span><span id="progress-count">0/40 Câu hỏi</span></div>
                <div class="bar-outer"><div class="bar-inner" id="progress-fill"></div></div>
            </div>
            <div class="navbar-actions">
                <button id="save-draft" style="background: white; color: #1F2937; border: 1px solid #E5E7EB; margin-right: 12px;"><i class="fa-regular fa-floppy-disk"></i> Lưu nháp</button>
                <button id="submit-btn" onclick="triggerSubmit()"><i class="fa-solid fa-circle-check"></i> Hoàn thành</button>
            </div>
        </nav>

        <main class="content-panel"><div id="active-grid"></div></main>
    </div>

    <!-- Script triggers -->
    <script src="js/app.js"></script>
    <script>
        function saveProfileAndStart() {
            const name = document.getElementById('company-name').value;
            const tax = document.getElementById('company-tax').value;
            if (!name || !tax) { alert('Vui lòng điền đầy đủ thông tin!'); return; }
            localStorage.setItem('rbp_profile', JSON.stringify({ name: name, tax: tax, date: new Date().toLocaleDateString('vi-VN') }));
            document.getElementById('startup-modal').style.display = 'none';
        }
        document.addEventListener("DOMContentLoaded", () => {
            const profile = localStorage.getItem('rbp_profile');
            if (profile) document.getElementById('startup-modal').style.display = 'none';
        });
    </script>
</body>
</html>
