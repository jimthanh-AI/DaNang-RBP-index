<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBP Da Nang - Self Assessment</title>
    <!-- Font Awesome icons for prettier looks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #10B981; /* Emerald Green */
            --primary-hover: #059669;
            --primary-light: #D1FAE5;
            --secondary: #6B7280;
            --bg-page: #F3F8F5; /* Soft Mint/Gray Background */
            --bg-card: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.05), 0 8px 10px -6px rgba(16, 185, 129, 0.05);
            --glass: rgba(255, 255, 255, 0.85);
            --sidebar-width: 280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            height: 100%;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            padding-bottom: 32px;
            border-bottom: 1px solid var(--border);
        }

        .nav-links {
            list-style: none;
            margin-top: 32px;
        }

        .nav-item {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-muted);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item:hover {
            background: var(--bg-page);
            color: var(--primary);
        }

        .nav-item.active {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.1);
        }

        /* Main Layout Area */
        .main-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Navbar Top */
        .navbar {
            height: 80px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 9;
        }

        .progress-container {
            flex-grow: 1;
            max-width: 400px;
        }

        .progress-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }

        .bar-outer {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .bar-inner {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), #34D399);
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        .navbar-actions button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.2);
            transition: all 0.3s ease;
        }

        .navbar-actions button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(5, 150, 105, 0.23);
        }

        /* Content Frame */
        .content-panel {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        #active-grid {
            display: grid;
            gap: 20px;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .question-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .question-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-light);
            box-shadow: 0 10px 20px -10px rgba(16, 185, 129, 0.15);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .question-id {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 700;
            font-size: 0.85rem;
            padding: 4px 8px;
            border-radius: 6px;
            min-width: 40px;
            text-align: center;
        }

        .question-text {
            font-weight: 500;
            font-size: 1rem;
            line-height: 1.5;
        }

        /* Radio Grouping */
        .options-box {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .radio-btn {
            flex: 1;
            min-width: 120px;
            position: relative;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .radio-btn input {
            position: absolute;
            opacity: 0;
        }

        .radio-btn:hover {
            background: #f9fdfb;
            border-color: var(--primary);
        }

        .radio-btn.selected {
            border-color: var(--primary);
            background: #ecfdf5;
            color: var(--primary);
            font-weight: 600;
        }

        .upload-box {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px dashed var(--border);
        }

        .upload-btn {
            font-size: 0.85rem;
            background: #F3F4F6;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .upload-btn:hover {
            background: #E5E7EB;
        }

        .file-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <!-- Sidebar Left Navigation -->

    <!-- Main Wrapper View -->
    <div class="main-wrapper">
        
        <!-- Top Navbar containing Progress and Actions -->
        <nav class="navbar">
            <div class="progress-container">
                <div class="progress-text">

            </div>
            
            <div class="navbar-actions">

                </button>
                <button id="submit-btn" onclick="triggerSubmit()">
                    <i class="fa-solid fa-circle-check"></i> Hoàn thành

        </nav>

        <!-- Dynamic Content Display Frame -->
        <main class="content-panel">
            <div id="active-grid">
                <!-- Javascript will load the content items dynamically on step change -->
            </div>
        </main>

    </div>

    <!-- Scripts setup -->

        let currentPillar = 'G';
        let userAnswers = {}; 
        const totalQuestions = 40;

        document.addEventListener("DOMContentLoaded", () => {
            loadDraft();
            setupTabListeners();
            renderQuestions(currentPillar);
            updateProgress();
            setupActions();
        });

        function setupTabListeners() {
            const tabs = document.querySelectorAll('.nav-item');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentPillar = tab.getAttribute('data-pillar');
                    renderQuestions(currentPillar);
                });
            });
        }

        function renderQuestions(pillarId) {
            const grid = document.getElementById('active-grid');
            grid.innerHTML = ''; 
            const pillarObj = questionsData.pillars.find(p => p.id === pillarId);
            if (!pillarObj) return;

            pillarObj.questions.forEach(q => {
                const card = document.createElement('div');
                card.className = 'question-card';

                const header = document.createElement('div');
                header.className = 'card-header';
                header.innerHTML = `<span class="question-id">${q.id}</span><span class="question-text">${q.text}</span>`;
                card.appendChild(header);

                const optionsBox = document.createElement('div');
                optionsBox.className = 'options-box';
                
                q.options.forEach(opt => {
                    const isChecked = userAnswers[q.id] === opt;
                    const label = document.createElement('label');
                    label.className = `radio-btn ${isChecked ? 'selected' : ''}`;
                    label.innerHTML = `<input type="radio" name="${q.id}" value="${opt}" ${isChecked ? 'checked' : ''}><span>${opt}</span>`;
                    
                    const input = label.querySelector('input');
                    input.addEventListener('change', () => {
                        userAnswers[q.id] = opt;
                        const sibs = optionsBox.querySelectorAll('.radio-btn');
                        sibs.forEach(s => s.classList.remove('selected'));
                        label.classList.add('selected');
                        updateProgress();
                    });
                    optionsBox.appendChild(label);
                });
                card.appendChild(optionsBox);

                const uploadBox = document.createElement('div');
                uploadBox.className = 'upload-box';
                const fileInput = document.createElement('input');
                fileInput.type = 'file'; fileInput.style.display = 'none'; fileInput.id = `file-${q.id}`;
                uploadBox.appendChild(fileInput);

                uploadBox.innerHTML += `
                    <button class="upload-btn" onclick="document.getElementById('file-${q.id}').click()">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Tải tài liệu
                    </button>
                    <span class="file-hint" id="hint-${q.id}">${q.evidence ? 'Yêu cầu: ' + q.evidence : 'Không bắt buộc'}</span>
                `;
                card.appendChild(uploadBox);
                grid.appendChild(card);

                const actualInput = card.querySelector(`#file-${q.id}`);
                const actualHint = card.querySelector(`#hint-${q.id}`);
                actualInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        const fileName = e.target.files[0].name;
                        actualHint.innerHTML = `<b style="color:var(--primary)"><i class="fa-solid fa-paperclip"></i> Đã chọn: ${fileName}</b>`;
                    }
                });
            });
        }

        function updateProgress() {
            const answeredCount = Object.keys(userAnswers).filter(k => k !== 'uploads').length;
            const percentage = Math.round((answeredCount / totalQuestions) * 100);
            document.getElementById('progress-percent').innerText = `${percentage}%`;
            document.getElementById('progress-count').innerText = `${answeredCount}/${totalQuestions} Câu hỏi`;
            document.getElementById('progress-fill').style.width = `${percentage}%`;
        }

        function setupActions() {
            document.getElementById('save-draft').addEventListener('click', () => {
                localStorage.setItem('rbp_assessment_draft', JSON.stringify(userAnswers));
                alert('Đã lưu nháp tiến trình thành công!');
            });
        }

        function loadDraft() {
            const draft = localStorage.getItem('rbp_assessment_draft');
            if (draft) userAnswers = JSON.parse(draft);
        }

        function triggerSubmit() {
            let totalScore = 0;
            let scoresByPillar = { G: 0, S: 0, E: 0, C: 0 };
            questionsData.pillars.forEach(pillar => {
                pillar.questions.forEach(q => {
                    const answer = userAnswers[q.id];
                    let value = 0;
                    if (answer === 'Yes') value = 2.5;
                    else if (answer === 'Partial') value = 1.25;
                    else if (answer === 'No') value = 0;
                    else if (answer === 'N/A' && q.id === 'E5') value = 2.5;
                    scoresByPillar[pillar.id] += value;
                    totalScore += value;
                });
            });
            localStorage.setItem('rbp_scores', JSON.stringify(scoresByPillar));
            localStorage.setItem('rbp_total', totalScore);
            localStorage.setItem('rbp_answers', JSON.stringify(userAnswers));
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
